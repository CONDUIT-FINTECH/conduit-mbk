version: '3.9'

services:
  # ─── Infrastructure ────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - '9092:9092'
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit_secret
      POSTGRES_DB: conduit_events
      POSTGRES_MULTIPLE_DATABASES: conduit_query
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit_secret
      POSTGRES_DB: conduit_metrics
    volumes:
      - tsdata:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db

  # ─── ML Service (Python) ──────────────────────────
  ml-service:
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
    ports:
      - '4008:4008'
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: conduit-ml-service
      KAFKA_GROUP_ID_ML: conduit-ml-group
      KAFKA_AUTO_OFFSET_RESET: latest
      ML_WARMUP_SAMPLES: 50
      ML_MAX_SAMPLES: 1000
      ML_REFIT_EVERY: 100
      ML_CONTAMINATION: '0.05'
      ML_ZSCORE_THRESHOLD: '3.0'
      ML_MIN_PUBLISH_SCORE: '0.0'
      ML_MODEL_ID: isolation-forest-v1
      ML_PORT: 4008
      LOG_LEVEL: info
    depends_on:
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4008/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
  tsdata:
  mongodata:
